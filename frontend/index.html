<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Traffic Routing System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">
    <h1>🚦 Traffic Routing System</h1>

    <div class="card">

        <div class="input-group">
            <label>Source</label>
            <input type="text" id="source" placeholder="Enter source (A)">
        </div>

        <div class="input-group">
            <label>Destination</label>
            <input type="text" id="destination" placeholder="Enter destination (D)">
        </div>

        <button onclick="findRoute()">Find Best Route</button>

        <div id="result" class="result-box"></div>

        <!-- Graph -->
        <div id="network"></div>

    </div>
</div>

<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Your JS -->
<script src="script.js"></script>

</body>
</html>
